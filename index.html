<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/home.css">
</head>

<body>
  <header>
    <div class="container">
      <img src="./img/Logo.svg" alt="logo" width="150" height="35">

      <nav>
        <a href="#home" class="active">Home</a>
        <a href="">Shop</a>
        <a href="">Plant Care</a>
        <a href="">Blogs</a>
      </nav>

      <button><img src="./img/Logout.svg" alt="login"><span>Login</span></button>
    </div>

  </header>

  <main>
    <section id="home">
      <div class="main-container">
        <div class="home-text">
          <p class="top-text">Welcome to GreenShop</p>

          <h1>Let’s Make a Better <span>Planet</span></h1>

          <p class="text">We are an online plant shop offering a wide range of cheap and trendy plants. Use our plants
            to create an
            unique Urban Jungle. Order your favorite plants!</p>
          <button class="large-btn">SHOP NOW</button>
        </div>

        <div class="home-media">
          <img src="./img/section1-plant.png" alt="plant">
        </div>
      </div>

    </section>
  </main>

  <footer></footer>

</html>
